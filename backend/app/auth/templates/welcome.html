<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <style>
    body { font-family: -apple-system, sans-serif; background: #000; margin: 0; padding: 40px 20px; color: #fff; }
    .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; max-width: 480px; margin: 0 auto; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .logo { font-size: 20px; font-weight: 800; color: #00f0ff; margin-bottom: 32px; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { font-size: 24px; font-weight: 800; color: #fff; margin: 0 0 12px; text-transform: uppercase; }
    p { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; margin: 0 0 24px; }
    .btn { display: inline-block; background: #00f0ff; color: #000; text-decoration: none;
           padding: 14px 28px; border-radius: 8px; font-size: 14px; font-weight: 800; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Adzy.pro Intelligence</div>
    <h1>System Entry Confirmed</h1>
    <p>Identity verification successful for {{ username }}. Marketplace credentials activated. Access the command center via the link below.</p>
    <a href="{{ login_url }}" class="btn">Enter Mission Control</a>
  </div>
</body>
</html>
