x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &always-restart
  restart: unless-stopped

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adzy_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-adzy}
      POSTGRES_USER:     ${POSTGRES_USER:-adzy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adzy_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c max_connections=100
        -c log_min_duration_statement=500
        -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adzy} -d ${POSTGRES_DB:-adzy}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── PgBouncer ───────────────────────────────────────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: adzy_pgbouncer
    environment:
      POSTGRESQL_HOST:           postgres
      POSTGRESQL_PORT:           5432
      POSTGRESQL_DATABASE:       ${POSTGRES_DB:-adzy}
      POSTGRESQL_USERNAME:       ${POSTGRES_USER:-adzy}
      POSTGRESQL_PASSWORD:       ${POSTGRES_PASSWORD:-adzy_dev_password}
      PGBOUNCER_DATABASE:        ${POSTGRES_DB:-adzy}
      PGBOUNCER_POOL_MODE:       transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE:   5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
      PGBOUNCER_AUTH_TYPE:       plain
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_LOG_CONNECTIONS: 0
      PGBOUNCER_LOG_DISCONNECTIONS: 0
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adzy_redis
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 60 1000
        --loglevel warning
        --databases 4
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── FastAPI backend (dev — hot reload) ──────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile.dev
    container_name: adzy_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-adzy}:${POSTGRES_PASSWORD:-adzy_dev_password}@pgbouncer:6432/${POSTGRES_DB:-adzy}
      DATABASE_URL_SYNC:   postgresql://${POSTGRES_USER:-adzy}:${POSTGRES_PASSWORD:-adzy_dev_password}@postgres:5432/${POSTGRES_DB:-adzy}
      REDIS_URL:           redis://redis:6379/0
      ENV:                 development
      FRONTEND_URL:        http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      S3_ENDPOINT_URL:     http://minio:9000
      CDN_BASE_URL:        http://localhost:9000/adzy-gigs
      AWS_ACCESS_KEY_ID:   minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION:          us-east-1
      S3_BUCKET_NAME:      adzy-gigs
      SMTP_HOST:           mailpit
      SMTP_PORT:           1025
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── Fraud Detection Microservice (Industrial) ──────────────────────────────
  fraud-ml-service:
    build:
      context:    ./backend
      dockerfile: fraud_detection/Dockerfile
    container_name: adzy_fraud_ml
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      REDIS_URL:           redis://redis:6379/1
      MODEL_PATH:          /app/fraud_detection/models/baseline.pkl
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── Celery worker (media processing) ────────────────────────────────────────
  worker:
    build:
      context:    ./backend
      dockerfile: Dockerfile.dev
    container_name: adzy_worker
    command: >
      celery -A app.worker.tasks worker
      --loglevel=info
      --concurrency=2
      --queues=default,industrial
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER:-adzy}:${POSTGRES_PASSWORD:-adzy_dev_password}@postgres:5432/${POSTGRES_DB:-adzy}
      REDIS_URL:           redis://redis:6379/0
      S3_ENDPOINT_URL:     http://minio:9000
      AWS_ACCESS_KEY_ID:   minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME:      adzy-gigs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── Celery beat (view-counter flush, level recompute) ───────────────────────
  celery_beat:
    build:
      context:    ./backend
      dockerfile: Dockerfile.dev
    container_name: adzy_celery_beat
    command: >
      celery -A app.media.tasks beat
      --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-adzy}:${POSTGRES_PASSWORD:-adzy_dev_password}@postgres:5432/${POSTGRES_DB:-adzy}
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── Flower (Celery monitoring) ───────────────────────────────────────────────
  flower:
    build:
      context:    ./backend
      dockerfile: Dockerfile.dev
    container_name: adzy_flower
    command: >
      celery -A app.media.tasks flower
      --port=5555
      --basic_auth=admin:adzy_dev
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FRAUD_ML_URL: http://fraud-ml-service:8001
    depends_on:
      - redis
    networks:
      - adzy_network
    logging: *default-logging

  # ── Next.js frontend (dev — hot reload) ─────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: Dockerfile.dev
    container_name: adzy_frontend
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV:            development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING:   "true"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── MinIO (local S3 substitute) ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: adzy_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - adzy_network
    logging: *default-logging
    <<: *always-restart

  # ── MinIO bucket init (runs once) ───────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: adzy_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/adzy-gigs &&
        mc anonymous set download local/adzy-gigs &&
        echo 'MinIO bucket ready'
      "
    networks:
      - adzy_network

  # ── Mailpit (email catch-all) ────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: adzy_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - adzy_network
    logging: *default-logging

  # ── pgAdmin — only with: docker compose --profile tools up ───────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adzy_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@adzy.local
      PGADMIN_DEFAULT_PASSWORD: adzy_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adzy_network
    profiles:
      - tools

  # ── Redis Commander — only with: docker compose --profile tools up ────────────
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: adzy_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - adzy_network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
  frontend_node_modules:
  frontend_next:

networks:
  adzy_network:
    driver: bridge
